<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>حلقة 2</title>

  <!-- خط كايرو -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo',sans-serif;
    }

    body{
      background:#000;
      color:#fff;
      padding:20px;
      min-height:100vh;
    }

    .container{
      width:100%;
      max-width:1100px;
      margin:auto;
    }

    .title{
      text-align:center;
      font-size:42px;
      font-weight:800;
      margin-bottom:30px;
    }

    /* أزرار المشغلات */

    .servers{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
      margin-bottom:25px;
      flex-wrap:wrap;
    }

    .server-btn{
      background:#111;
      color:#fff;
      border:2px solid #222;
      padding:14px 28px;
      border-radius:14px;
      cursor:pointer;
      font-size:18px;
      font-weight:700;
      transition:0.3s;
    }

    .server-btn:hover{
      background:#fff;
      color:#000;
    }

    .server-btn.active{
      background:#fff;
      color:#000;
    }

    /* المشغل */

    .player-wrapper{
      position:relative;
      width:100%;
      padding-top:56.25%;
      overflow:hidden;
      border-radius:20px;
      background:#111;
      border:2px solid #222;
      box-shadow:0 0 25px rgba(255,255,255,0.05);
      margin-bottom:40px;
    }

    .player{
      display:none;
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
    }

    .player.active{
      display:block;
    }

    .player iframe{
      width:100%;
      height:100%;
    }

    /* التحميل */

    .download-title{
      text-align:center;
      font-size:28px;
      font-weight:800;
      margin-bottom:25px;
    }

    .downloads{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-bottom:50px;
    }

    .download-btn{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      background:#111;
      color:#fff;
      padding:18px;
      border-radius:16px;
      border:2px solid #222;
      font-size:20px;
      font-weight:700;
      transition:0.3s;
      overflow:hidden;
    }

    .download-btn:hover{
      background:#fff;
      color:#000;
      transform:translateY(-4px);
    }

    /* علامة الأفضل */

    .best-badge{
      position:absolute;
      top:10px;
      left:10px;
      background:#ffd500;
      color:#000;
      padding:4px 10px;
      border-radius:8px;
      font-size:13px;
      font-weight:800;
    }

    /* زر تيليجرام */

    .telegram-box{
      display:flex;
      justify-content:center;
      margin-top:10px;
      margin-bottom:30px;
    }

    .telegram-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-decoration:none;
      background:linear-gradient(135deg,#0088cc,#00bfff);
      color:#fff;
      padding:18px 35px;
      border-radius:18px;
      font-size:22px;
      font-weight:800;
      transition:0.3s;
      box-shadow:0 0 25px rgba(0,191,255,0.4);
    }

    .telegram-btn:hover{
      transform:translateY(-5px) scale(1.03);
      box-shadow:0 0 35px rgba(0,191,255,0.7);
    }

    .telegram-icon{
      font-size:28px;
    }

    @media (max-width:768px){

      .title{
        font-size:34px;
      }

      .server-btn{
        width:100%;
      }

      .download-btn{
        font-size:18px;
      }

      .telegram-btn{
        width:100%;
        text-align:center;
        font-size:20px;
      }

    }

    @media (max-width:480px){

      body{
        padding:15px;
      }

      .title{
        font-size:28px;
      }

      .download-title{
        font-size:24px;
      }

      .telegram-btn{
        font-size:18px;
        padding:16px 20px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <h1 class="title">الحلقة 1</h1>

    <!-- أزرار المشغلات -->

    <div class="servers">

      <button class="server-btn active" onclick="showPlayer(1,this)">
        مشغل مشاهدة 1
      </button>

      <button class="server-btn" onclick="showPlayer(2,this)">
        مشغل مشاهدة 2
      </button>

    </div>

    <!-- المشغل -->

    <div class="player-wrapper">

      <!-- المشغل الأول -->

      <div class="player active" id="player1">
        <iframe
          id="iframe1"
          src="https://playmogo.com/e/ymnkjnxn9227"
          scrolling="no"
          frameborder="0"
          allowfullscreen="true">
        </iframe>
      </div>

      <!-- المشغل الثاني -->

      <div class="player" id="player2">
        <iframe
          id="iframe2"
          src=""
          allowfullscreen
          allowtransparency
          allow="autoplay"
          scrolling="no"
          frameborder="0">
        </iframe>
      </div>

    </div>

    <!-- التحميل -->

    <h2 class="download-title">التحميل</h2>

    <div class="downloads">

      <!-- تحميل مباشر -->

      <a class="download-btn" href="https://frdl.io/5hl0a1vvz84y/SF_S1_Ep2_(Ar-Sub).mp4.html" target="_blank">

        <span class="best-badge">الأفضل</span>

        تحميل مباشر

      </a>

      <!-- تحميل 2 -->

      <a class="download-btn" href="https://ddownload.com/mg9bxe5sjeee/SF_S1_Ep2_(Ar-Sub).mp4" target="_blank">

        تحميل 2

      </a>

    </div>

    <!-- زر تيليجرام -->

    <div class="telegram-box">

      <a class="telegram-btn" href="https://t.me/CARTOONYB" target="_blank">

        <span class="telegram-icon">📢</span>

        تابعنا على تيليجرام عشان تعرف كل جديد

      </a>

    </div>

  </div>

  <script>

    function showPlayer(playerNumber,button){

      // إخفاء كل المشغلات
      document.querySelectorAll('.player').forEach(player=>{
        player.classList.remove('active');
      });

      // إزالة التفعيل من الأزرار
      document.querySelectorAll('.server-btn').forEach(btn=>{
        btn.classList.remove('active');
      });

      // إيقاف المشغل الثاني عند التبديل
      document.getElementById('iframe2').src = '';

      // إظهار المشغل المختار
      document.getElementById('player'+playerNumber).classList.add('active');

      // تفعيل الزر الحالي
      button.classList.add('active');

      // تشغيل المشغل الثاني فقط عند الضغط عليه
      if(playerNumber === 2){
        document.getElementById('iframe2').src =
        'https://voe.sx/e/na43k2iamy5a';
      }

    }

  </script>

</body>
</html>
